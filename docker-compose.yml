services:

  ollama:
    image: ollama/ollama:latest
    profiles: ["full"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    mem_limit: 16g
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  finbot-app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - FINBOT_OLLAMA_HOST=${FINBOT_OLLAMA_HOST:-http://ollama:11434}
      - FINBOT_KEY_DIR=/app/data/.keys
      - FINBOT_DATA_DIR=/app/data
      - FINBOT_WATCH_FOLDER=/app/finbot-inbox
    volumes:
      - finbot_data:/app/data
      - ./finbot-inbox:/app/finbot-inbox
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  ollama_models:
  finbot_data:
