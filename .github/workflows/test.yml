name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --dev
      - run: uv run ruff check src/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --dev

      - name: Initialize database
        run: |
          uv run python -c "
          from finbot.db.database import init_db, get_session
          from finbot.db.seed import seed_all
          init_db()
          with get_session() as s:
              seed_all(s)
          "

      - name: Run tests (skip LLM tests)
        run: uv run pytest -m "not llm" --tb=short --cov=finbot --cov-report=xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
